<!DOCTYPE html>
<html>
    <head>
        <title>User Information</title>
    </head>
    <body>
        <h1 style="text-align: center;">Registration</h1>
        <br><br>
        <form>
            <label>Full Name:</label>
            <input type="text">
            <br><br>
            <label>Age:</label>
            <input type="number">
            <br><br>
            <label>Email:</label>
            <input type="email">
            <br><br>
            <label>Gender:</label><br>
            <input type="radio" name="Gender">
            <label>Male</label>
            <input type="radio" name="Gender">
            <label>Female</label>
            <br><br>
            <label>Qualification</label>
            <select>
                <option>Choose..</option>
                <option>10</option>
                <option>+2</option>
                <option>Ug</option>
                <option>Pg</option>
            </select>
            <br><br>
            <label>Skills:</label>
            <br>
            <input type="checkbox">
            <label>HTML</label>
            <br>
            <input type="checkbox">
            <label>CSS</label>
            <br>
            <input type="checkbox">
            <label>JavaScript</label>
            <br>
            <input type="checkbox">
            <label>Bootstrap</label>
            <br><br><br>
            <input type="submit" value="submit">
        </form>
    </body>
</html>
